<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HEXIS Full Ecosystem</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #2dd4bf; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .full-row { grid-column: 1 / -1; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .lineage-box { display: flex; justify-content: space-around; align-items: center; background: #0f172a; padding: 40px; border-radius: 15px; min-height: 100px; }
        .node { padding: 15px; border: 2px solid var(--accent); border-radius: 10px; width: 160px; text-align: center; background: #1e293b; }
        .arrow { font-size: 2rem; color: #64748b; }
        .price { color: #4ade80; font-weight: bold; }
        input { padding: 10px; border-radius: 6px; border: none; width: 200px; }
        button { padding: 10px 20px; border-radius: 6px; border: none; background: var(--accent); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="text-align:center; color: var(--accent);">🦎 HEXIS ECOSYSTEM v1.0</h1>
    <div class="grid">
        <div class="card">
            <h2>🧬 Specimen</h2>
            <div style="display: flex; gap: 10px;">
                <input id="n" placeholder="개체 이름 입력">
                <button onclick="alert('등록되었습니다!')">DB 저장</button>
            </div>
        </div>
        <div class="card">
            <h2>💰 Live Market</h2>
            <div id="marketList">로딩 중...</div>
        </div>
        <div class="card full-row">
            <h2>🌳 Lineage Explorer (Gen 2)</h2>
            <div id="lineageArea" class="lineage-box">데이터를 불러오는 중...</div>
        </div>
    </div>
    <script>
        async function loadData() {
            try {
                // 1. 경매 데이터 로드
                const mRes = await fetch('/api/market/auctions');
                const mData = await mRes.json();
                document.getElementById('marketList').innerHTML = mData.map(function(a) {
                    return '<div style="padding:8px; border-bottom:1px solid #334155;">' + a.name + ' - <span class="price">₩' + a.currentPrice.toLocaleString() + '</span></div>';
                }).join('');

                // 2. 가계도 데이터 로드
                const lRes = await fetch('/api/nexus/lineage/HEX-BABY-001');
                const lData = await lRes.json();
                document.getElementById('lineageArea').innerHTML = 
                    '<div class="node"><small>FATHER</small><br><b>' + lData.parents.father.name + '</b></div>' +
                    '<div class="arrow">+</div>' +
                    '<div class="node"><small>MOTHER</small><br><b>' + lData.parents.mother.name + '</b></div>' +
                    '<div class="arrow">➔</div>' +
                    '<div class="node" style="background:var(--accent); color:#0f172a;"><small>TARGET</small><br><b>' + lData.name + '</b></div>';
            } catch (e) {
                console.error('Error loading data:', e);
                document.getElementById('marketList').innerText = '데이터 로드 실패';
            }
        }
        loadData();
    </script>
</body>
</html>
