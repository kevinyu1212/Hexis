
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEXIS Ecosystem Dashboard</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 40px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        .card { background: #1e293b; border-radius: 16px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { color: #94a3b8; font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        
        /* 경매 스타일 */
        .auction-item { background: #0f172a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #38bdf8; transition: transform 0.2s; }
        .auction-item:hover { transform: translateX(5px); }
        .tag { font-weight: bold; color: #38bdf8; font-size: 1.1rem; }
        .price { color: #10b981; font-size: 1.2rem; font-weight: bold; margin: 5px 0; }
        
        /* 가계도 스타일 */
        .lineage-box { text-align: center; padding: 20px; background: #0f172a; border-radius: 12px; border: 1px dashed #475569; }
        .node { padding: 10px; border-radius: 8px; background: #334155; margin: 10px 0; display: inline-block; width: 80%; }
        .connector { height: 30px; width: 2px; background: #475569; margin: 0 auto; }
        .father { border: 1px solid #38bdf8; color: #38bdf8; }
        .target { border: 2px solid #10b981; color: #10b981; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦎 HEXIS Dashboard</h1>
        
        <div class="grid">
            <div class="card">
                <h2>Live Auction Market</h2>
                <div id="auction-list">데이터를 불러오는 중...</div>
            </div>

            <div class="card">
                <h2>Lineage Explorer (Gen 2)</h2>
                <div id="lineage-info">
                    <!-- JS로 채워질 공간 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 경매 목록 API 호출
        fetch("/api/market/auctions")
            .then(res => res.json())
            .then(res => {
                const list = document.getElementById("auction-list");
                list.innerHTML = "";
                res.data.forEach(auc => {
                    list.innerHTML += `
                        <div class="auction-item">
                            <div class="tag">${auc.Specimen.hexisTag}</div>
                            <div style="color:#94a3b8; font-size: 0.9rem;">${auc.Specimen.morph}</div>
                            <div class="price">₩${auc.currentPrice.toLocaleString()}</div>
                            <div style="font-size: 0.8rem; color: ${auc.status === "Active" ? "#38bdf8" : "#ef4444"}">● ${auc.status}</div>
                        </div>
                    `;
                });
            });

        // 특정 가계도 API 호출 (ID 2번 기준)
        fetch("/api/nexus/lineage/2")
            .then(res => res.json())
            .then(res => {
                const info = document.getElementById("lineage-info");
                info.innerHTML = `
                    <div class="lineage-box">
                        <div class="node father">
                            <small>FATHER</small><br>
                            ${res.family.father.tag || "Unknown"}
                        </div>
                        <div class="connector"></div>
                        <div class="node target">
                            <small>TARGET (Gen 2)</small><br>
                            ${res.target.tag}<br>
                            <span style="font-size:0.8rem; font-weight:normal;">${res.target.morph}</span>
                        </div>
                    </div>
                `;
            });
    </script>
</body>
</html>
