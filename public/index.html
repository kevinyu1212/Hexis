<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HEXIS Ecosystem Hub</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #2dd4bf; --text: #f8fafc; --glass: rgba(255, 255, 255, 0.03); }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 20%, #1e293b 0%, #020617 80%);
        }
        .header { text-align: center; padding: 60px 20px; }
        .header h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; color: var(--accent); }
        .header p { color: #94a3b8; margin-top: 10px; font-size: 1.1rem; }

        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            max-width: 900px; 
            width: 90%;
            margin-bottom: 50px;
        }
        .menu-item { 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid #334155; 
            text-decoration: none; 
            color: var(--text); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .menu-item:hover { 
            border-color: var(--accent); 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(45, 212, 191, 0.1);
            background: #1e2945;
        }
        .menu-item .icon { font-size: 3.5rem; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        .menu-item b { font-size: 1.4rem; margin-bottom: 8px; color: var(--accent); }
        .menu-item span { color: #94a3b8; font-size: 0.9rem; }
        
        .status-dot {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦎 HEXIS HUB</h1>
        <p>Next-Generation Reptile Ecosystem Management</p>
    </div>

    <div class="menu-grid">
        <a href="specimen.html" class="menu-item">
            <div class="status-dot"></div>
            <div class="icon">🧬</div>
            <b>Specimen</b>
            <span>새로운 개체 등록 및 관리</span>
        </a>
        <a href="market.html" class="menu-item">
            <div class="status-dot" style="background: #f43f5e; box-shadow: 0 0 10px #f43f5e;"></div>
            <div class="icon">💰</div>
            <b>Market</b>
            <span>실시간 프리미엄 경매 참여</span>
        </a>
        <a href="nexus.html" class="menu-item">
            <div class="status-dot"></div>
            <div class="icon">🌳</div>
            <b>Nexus</b>
            <span>유전 계보 및 가계도 탐색</span>
        </a>
        <a href="calc.html" class="menu-item">
            <div class="status-dot" style="background: #6366f1; box-shadow: 0 0 10px #6366f1;"></div>
            <div class="icon">🧮</div>
            <b>Calculator</b>
            <span>모프 확률 분석 및 계산</span>
        </a>
    </div>

    <footer style="color: #475569; font-size: 0.8rem; margin-bottom: 40px;">
        &copy; 2026 HEXIS ECOSYSTEM. All rights reserved.
    </footer>
</body>
</html>
