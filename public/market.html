<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HEXIS Premium Market</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #2dd4bf; --danger: #f43f5e; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 40px; margin: 0; }
        .auction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; }
        .auction-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; }
        .auction-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card-img { width: 100%; height: 180px; background: linear-gradient(45deg, #0f172a, #1e293b); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .card-body { padding: 20px; }
        .timer { background: rgba(244, 63, 94, 0.1); color: var(--danger); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .price-label { color: #94a3b8; font-size: 0.9rem; }
        .current-price { font-size: 1.6rem; color: var(--accent); font-weight: 800; display: block; margin: 5px 0 20px 0; }
        .bid-btn { width: 100%; padding: 15px; background: var(--accent); color: #020617; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div style="max-width: 1200px; margin: auto;">
        <a href="index.html" class="back-btn">← Lobby Hub</a>
        <h1 style="font-size: 2.5rem; margin-top: 20px;">🔥 Live Premium Auction</h1>
        <div class="auction-grid" id="marketList"></div>
    </div>
    <script>
        function loadMarket() {
            fetch('/api/market/auctions')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    var list = document.getElementById('marketList');
                    var html = '';
                    data.forEach(function(a) {
                        html += '<div class="auction-card">' +
                                '<div class="card-img">🦎</div>' +
                                '<div class="card-body">' +
                                '<div class="timer">⏳ 04:22:15 Left</div>' +
                                '<h3 style="margin:0; font-size: 1.2rem;">' + a.name + '</h3>' +
                                '<p style="color:#94a3b8; font-size:0.85rem; margin: 5px 0 15px 0;">Morph: High-End Lilly White</p>' +
                                '<span class="price-label">Current Bid</span>' +
                                '<span class="current-price">₩' + a.currentPrice.toLocaleString() + '</span>' +
                                '<button class="bid-btn" onclick="placeBid(' + a.id + ')">Place Bid (+10,000)</button>' +
                                '</div></div>';
                    });
                    list.innerHTML = html;
                });
        }
        function placeBid(id) {
            fetch('/api/market/bid/' + id, { method: 'POST' }).then(function() { loadMarket(); });
        }
        loadMarket();
        setInterval(loadMarket, 5000);
    </script>
</body>
</html>
